name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - "codex/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  MJPS_LLM_MODE: mock
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONUNBUFFERED: "1"

jobs:
  quality:
    name: Quality and package
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          make client-install

      - name: Install Playwright browser
        run: cd client && npx playwright install chromium

      - name: Lint
        run: make lint

      - name: Client lint
        run: make client-lint

      - name: Typecheck
        run: make typecheck

      - name: Client typecheck
        run: make client-typecheck

      - name: Test
        run: make test

      - name: Client test
        run: make client-test

      - name: Build check
        run: make build

      - name: Client build
        run: make client-build

      - name: E2E
        run: make e2e

      - name: Generate OpenAPI
        run: make generate-openapi

      - name: Package
        run: make package

      - name: Verify public text policy
        run: python scripts/verify_ui_text.py

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package
          path: dist/*
          if-no-files-found: error

  platform-smoke:
    name: Platform smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          make client-install

      - name: Test
        run: python -m pytest

      - name: Build check
        run: python -m compileall -q src

      - name: Client build
        run: cd client && npm run build
